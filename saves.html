<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Save Files</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #333;
        }
        ul {
            list-style-type: none;
            padding: 0;
            display: inline-block;
            text-align: left;
        }
        li {
            background-color: #007BFF;
            color: white;
            margin: 10px 0;
            padding: 12px 20px;
            border-radius: 5px;
        }
        li a {
            color: white;
            text-decoration: none;
            display: block;
        }
        li a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Cool Save Files!</h1>
    <ul>
        <li><a href="#" data-save="Car Fun!">Car Fun!</a></li>
        <li><a href="#" data-save="Pendulum">Pendulum</a></li>
        <li><a href="#" data-save="Parkor 1">Parkor 1</a></li>
        <li><a href="#" data-save="Parkor 2">Parkor 2</a></li>
    </ul>
</body>
</html>
